name: Actualizar bitácora de suscripciones

on:
  schedule:
    # Corre cada 4 horas. Ajusta el cron si quieres otra frecuencia.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}   # permite lanzarlo manualmente desde la pestaña "Actions" en GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Construir la página
        run: python scripts/build_feed.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/last_seen.json
          git diff --quiet --cached || git commit -m "Actualización automática de la bitácora"
          git push
